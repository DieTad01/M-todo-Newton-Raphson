<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/icon.png" type="image/png">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora del Método de Newton-Raphson</h1>
    <form id="form">
        <label for="funcion">Función f(x):</label>
        <input type="text" id="funcion" name="funcion" placeholder="Ejemplo: x^2 - 2"><br>
        
        <label for="aproximacion">Aproximación inicial x0:</label>
        <input type="text" id="aproximacion" name="aproximacion" placeholder="Ejemplo: 1.5"><br>

        <label for="tolerancia">Tolerancia:</label>
        <input type="text" id="tolerancia" name="tolerancia" placeholder="Ejemplo: 0.001"><br>

        <label for="iteraciones">Máximo de iteraciones:</label>
        <input type="number" id="iteraciones" name="iteraciones" placeholder="Ejemplo: 100" value="100"><br>
        <button type="submit">Calcular</button>
    </form>

    <!-- Aquí se mostrará el resultado -->
    <center><div id="result"></div></center>

    <a href="../index.html">Regresar al índice</a><br>
    <center><footer>Autor: Pérez Hernández Diego Tadeo</footer></center>
    <!-- No se te olvide si ocupas otra libreria en tu script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="../js/calculadora.js"></script>

</body>
</html>
